# Argo CD — lean install for a small cluster.
# Access is via `kubectl port-forward` (no extra ingress/LB needed for the capstone).
configs:
  params:
    # Argo runs behind our TLS-terminating ingress-nginx during demos via port-forward;
    # insecure lets the API/UI serve plain HTTP inside the cluster (we tunnel over it).
    server.insecure: true
server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
dex:
  enabled: false        # no SSO needed for the capstone
