apiVersion: v1
kind: ConfigMap
metadata:
  name: taskapp-config
  namespace: taskapp
data:
  # --- app runtime ---
  PORT: "5000"
  FLASK_ENV: "production"
  # --- Postgres container init (postgres image reads POSTGRES_*) ---
  POSTGRES_DB: "taskmanager"
  POSTGRES_USER: "taskuser"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  # --- backend Alembic entrypoint (migrations/env.py reads DATABASE_*; non-secret parts) ---
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "taskmanager"
  DATABASE_USER: "taskuser"
