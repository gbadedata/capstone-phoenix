apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp
  namespace: taskapp
  annotations:
    # Start with STAGING to avoid burning Let's Encrypt prod rate limits while testing.
    # Once a staging cert issues cleanly, switch this to letsencrypt-prod and re-apply.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - taskapp.gbadedata.com
        - api.gbadedata.com
      secretName: taskapp-tls
  rules:
    - host: taskapp.gbadedata.com        # primary: frontend serves the app + proxies /api
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.gbadedata.com            # optional: direct access to the backend API
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
